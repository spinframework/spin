# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

# Finalizes an in-flight "Bump wasmtime (prerelease)" PR once the targeted
# wasmtime version has been published to crates.io. Complements bump-wasmtime.yml,
# which points Spin at a wasmtime release *branch* (a git dependency) so
# integration can begin before wasmtime ships.
#
# Run in two deliberate phases (implemented in ./scripts/wasmtime-release.sh):
#   action: update     Rewrite the open bump PR's git dependency to the published
#                      crates.io version and push it to the PR branch. A human
#                      reviews/amends and merges that PR.
#   action: backport   After the bump PR has merged, backport it onto the last
#                      Spin release branch, bump the patch version, and open a
#                      release PR.
#
# NOTE: Manual dispatch only for now; automation can be added once we trust it.
name: Finalize wasmtime release
on:
  workflow_dispatch:
    inputs:
      action:
        description: Which phase to run
        type: choice
        required: true
        default: update
        options:
          - update
          - backport
      pr_number:
        description: Bump-wasmtime PR number (auto-detected if empty)
        required: false
        default: ""
      crates_version:
        description: Published wasmtime crates.io version to pin (auto-detected if empty)
        required: false
        default: ""
      release_branch:
        description: Spin release branch to backport into, e.g. v4.0 (auto-detected if empty)
        required: false
        default: ""

# Serialize runs so a dispatch can't race with a previous one
concurrency: ${{ github.workflow }}

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update bump PR to crates.io release
    if: ${{ github.repository == 'spinframework/spin' && github.event.inputs.action == 'update' }}
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.SPINFRAMEWORKBOT_PR_PAT }}
      PR_NUMBER: ${{ github.event.inputs.pr_number }}
      CRATES_VERSION: ${{ github.event.inputs.crates_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.SPINFRAMEWORKBOT_PR_PAT }}
          fetch-depth: 0

      # Import GPG key for signing commits (matches bump-wasmtime.yml)
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Update bump PR to the crates.io release
        run: ./scripts/wasmtime-release.sh update

  backport:
    name: Backport bump PR and prepare patch release
    if: ${{ github.repository == 'spinframework/spin' && github.event.inputs.action == 'backport' }}
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.SPINFRAMEWORKBOT_PR_PAT }}
      PR_NUMBER: ${{ github.event.inputs.pr_number }}
      CRATES_VERSION: ${{ github.event.inputs.crates_version }}
      RELEASE_BRANCH: ${{ github.event.inputs.release_branch }}
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.SPINFRAMEWORKBOT_PR_PAT }}
          fetch-depth: 0

      # Import GPG key for signing commits (matches bump-wasmtime.yml)
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Backport bump PR and open patch release PR
        run: ./scripts/wasmtime-release.sh backport
