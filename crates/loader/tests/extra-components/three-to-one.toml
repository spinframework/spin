spin_manifest_version = 2

[application]
name = "file-errors"

[[trigger.http]]
route = "/a1"
component = "a"
dependencies.middleware = [{ component = "m1" }, { component = "m2" }]

[[trigger.http]]
route = "/a2"
component = "a"
dependencies.middleware = [{ component = "m2" }, { component = "m3" }]

[[trigger.http]]
route = "/a3"
component = "a"
dependencies.middleware = [{ component = "m3" }, { component = "m2" }, { component = "m1" }]

[[trigger.http]]
route = "/b"
component = "b"
dependencies.middleware = [{ component = "m1" }, { component = "m3" }]

[component.a]
source = "a.dummy.wasm.txt"

[component.b]
source = "b.dummy.wasm.txt"

[component.m1]
source = "a.dummy.wasm.txt"

[component.m2]
source = "b.dummy.wasm.txt"

[component.m3]
source = "c.dummy.wasm.txt"
